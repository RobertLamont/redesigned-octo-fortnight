<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE-Step 1.5 Song Generator</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, button { padding: 12px; margin: 10px 0; width: 100%; font-size: 16px; }
    button { background: #0066ff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎵 ACE-Step 1.5 Song Generator</h1>
  <input type="text" id="prompt" placeholder="Describe your song... (e.g. dreamy lo-fi hip hop about rainy Tokyo nights)" />
  <button onclick="generateSong()">Generate Song</button>

  <div id="status"></div>
  <audio id="audioPlayer" controls style="width:100%; margin-top:20px;"></audio>

  <script>
    const API_URL = "https://recite-dentist-divinely.ngrok-free.dev";   // ← Change this

async function generateSong() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return alert("Please enter a prompt");

  const status = document.getElementById('status');
  status.innerHTML = "Submitting job...";

  try {
    const releaseRes = await fetch(`${API_URL}/release_task`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: prompt,
        duration: 90,
        audio_format: "wav"
      })
    });

    const response = await releaseRes.json();
    
    // === IMPORTANT: Handle wrapped response ===
    const taskData = response.data || response;   // Support both formats
    const task_id = taskData.task_id || taskData.job_id;

    if (!task_id) {
      console.error("Full response:", response);
      throw new Error("No task_id in response");
    }

    status.innerHTML = `✅ Job submitted!<br>Task ID: ${task_id}<br>Generating...`;

    // Start polling
    pollForResult(task_id);

  } catch (err) {
    console.error(err);
    status.innerHTML = `❌ Error: ${err.message}`;
  }
}

// === Updated Polling Function ===
async function pollForResult(task_id) {
  const status = document.getElementById('status');
  let attempts = 0;
  const maxAttempts = 50;   // ~3.5 minutes

  while (attempts < maxAttempts) {
    await new Promise(r => setTimeout(r, 3000)); // Poll every 3 seconds

    try {
      const queryRes = await fetch(`${API_URL}/query_result`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          task_ids: [task_id] 
        })
      });

      const resultData = await queryRes.json();
      console.log("Poll result:", resultData);   // Helpful for debugging

      // Try multiple possible response structures
      const tasks = resultData.data || resultData;
      const task = tasks[task_id];

      if (task) {
        if (task.status === 1 || task.status === "completed") {   // Success
          status.innerHTML = "✅ Song ready! Playing...";
          document.getElementById('audioPlayer').src = `${API_URL}/v1/audio?task_id=${task_id}`;
          return;
        } 
        else if (task.status === 2 || task.status === "failed") {
          throw new Error(task.error || "Generation failed");
        }
      }
    } catch (e) {
      console.error("Polling error:", e);
    }

    attempts++;
    status.innerHTML = `Generating... (${attempts * 3}s)`;
  }

  status.innerHTML = "⏰ Timeout - Song took too long";
}
</script>
</body>
</html>
