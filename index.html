<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE-Step 1.5 Song Generator</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, button { padding: 12px; margin: 10px 0; width: 100%; font-size: 16px; }
    button { background: #0066ff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎵 ACE-Step 1.5 Song Generator</h1>
  <input type="text" id="prompt" placeholder="Describe your song... (e.g. dreamy lo-fi hip hop about rainy Tokyo nights)" />
  <button onclick="generateSong()">Generate Song</button>

  <div id="status"></div>
  <audio id="audioPlayer" controls style="width:100%; margin-top:20px;"></audio>

  <script>
    const API_URL = "https://recite-dentist-divinely.ngrok-free.dev";   // ← Change this

async function generateSong() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return alert("Please enter a prompt");

  const status = document.getElementById('status');
  const player = document.getElementById('audioPlayer');
  
  status.innerHTML = "Submitting job...";
  player.src = "";

  try {
    const releaseRes = await fetch(`${API_URL}/release_task`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: prompt,
        duration: 90,
        audio_format: "wav"
      })
    });

    const releaseData = await releaseRes.json();
    const taskData = releaseData.data || releaseData;
    const task_id = taskData.task_id || taskData.job_id;

    if (!task_id) throw new Error("No task_id received");

    status.innerHTML = `✅ Job submitted! Generating ${prompt}...`;
    pollForResult(task_id);

  } catch (err) {
    status.innerHTML = `❌ Error: ${err.message}`;
  }
}

async function pollForResult(task_id) {
  const status = document.getElementById('status');
  let attempts = 0;
  const maxAttempts = 60;

  while (attempts < maxAttempts) {
    await new Promise(r => setTimeout(r, 4000));

    try {
      const queryRes = await fetch(`${API_URL}/query_result`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task_id_list: [task_id] })
      });

      const resultData = await queryRes.json();
      const tasks = resultData.data || [];
      const task = tasks.find(t => t.task_id === task_id);

      if (task && task.status === 1) {
        const urls = task.public_urls || (task.public_url ? [task.public_url] : []);

        if (urls.length > 0) {
          status.innerHTML = `✅ Generated ${urls.length} song(s)!`;

          // Play the first song
          document.getElementById('audioPlayer').src = urls[0];
          console.log("Playing songs from S3:", urls);

          // Optional: Show all songs as buttons
          let html = `<p>✅ ${urls.length} song(s) generated:</p>`;
          urls.forEach((url, i) => {
            html += `<button onclick="playSong('${url}')">Play Song ${i+1}</button> `;
          });
          status.innerHTML += html;
        } else {
          status.innerHTML = "✅ Done, but no audio URL found";
        }
        return;
      }
    } catch (e) {
      console.error(e);
    }

    attempts++;
    status.innerHTML = `Generating... (${Math.round(attempts * 4)}s)`;
  }

  status.innerHTML = "⏰ Timeout";
}

// Helper function to play any song
function playSong(url) {
  document.getElementById('audioPlayer').src = url;
}
</script>
