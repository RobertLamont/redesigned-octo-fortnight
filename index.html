<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE-Step 1.5 Song Generator</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, button { padding: 12px; margin: 10px 0; width: 100%; font-size: 16px; }
    button { background: #0066ff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎵 ACE-Step 1.5 Song Generator</h1>
  <input type="text" id="prompt" placeholder="Describe your song... (e.g. dreamy lo-fi hip hop about rainy Tokyo nights)" />
  <button onclick="generateSong()">Generate Song</button>

  <div id="status"></div>
  <audio id="audioPlayer" controls style="width:100%; margin-top:20px;"></audio>

  <script>
    const API_URL = "https://recite-dentist-divinely.ngrok-free.dev";   // ← Change this

async function generateSong() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return alert("Please enter a prompt");

  const status = document.getElementById('status');
  const player = document.getElementById('audioPlayer');
  
  status.innerHTML = "Submitting job...";
  player.src = "";

  try {
    const releaseRes = await fetch(`${API_URL}/release_task`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: prompt,
        duration: 90,
        audio_format: "wav"
      })
    });

    const releaseData = await releaseRes.json();
    const taskData = releaseData.data || releaseData;
    const task_id = taskData.task_id || taskData.job_id;

    if (!task_id) throw new Error("No task_id received");

    status.innerHTML = `✅ Job submitted!<br>Generating...`;
    pollForResult(task_id);

  } catch (err) {
    status.innerHTML = `❌ Error: ${err.message}`;
  }
}

async function pollForResult(task_id) {
  const status = document.getElementById('status');

  while (true) {
    await new Promise(r => setTimeout(r, 4000));

    const res = await fetch(`${API_URL}/query_result`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ task_id_list: [task_id] })
    });

    const result = await res.json();
    const task = (result.data || []).find(t => t.task_id === task_id);

    if (task && task.status === 1) {
      if (task.public_url) {
        document.getElementById('audioPlayer').src = task.public_url;
        status.innerHTML = "✅ Playing from S3";
      } else {
        status.innerHTML = "❌ No S3 URL received";
      }
      return;
    }
  }
}
</script>
