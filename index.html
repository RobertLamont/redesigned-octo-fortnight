<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE-Step 1.5 Song Generator</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, button { padding: 12px; margin: 10px 0; width: 100%; font-size: 16px; }
    button { background: #0066ff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎵 ACE-Step 1.5 Song Generator</h1>
  <input type="text" id="prompt" placeholder="Describe your song... (e.g. dreamy lo-fi hip hop about rainy Tokyo nights)" />
  <button onclick="generateSong()">Generate Song</button>

  <div id="status"></div>
  <audio id="audioPlayer" controls style="width:100%; margin-top:20px;"></audio>

  <script>
    const API_URL = "https://recite-dentist-divinely.ngrok-free.dev";   // ← Change this

async function generateSong() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return alert("Please enter a prompt");

  const status = document.getElementById('status');
  const player = document.getElementById('audioPlayer');
  
  status.innerHTML = "Submitting job to ACE-Step...";
  player.src = "";   // Clear previous song

  try {
    // Step 1: Release Task
    const releaseRes = await fetch(`${API_URL}/release_task`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        prompt: prompt,
        duration: 90,
        audio_format: "wav"
      })
    });

    const releaseData = await releaseRes.json();
    const taskData = releaseData.data || releaseData;
    const task_id = taskData.task_id || taskData.job_id;

    if (!task_id) {
      throw new Error("Failed to get task_id");
    }

    status.innerHTML = `✅ Job submitted!<br>Task ID: ${task_id}<br>Generating song...`;

    // Step 2: Start polling
    pollForResult(task_id);

  } catch (err) {
    console.error(err);
    status.innerHTML = `❌ Error: ${err.message}`;
  }
}

async function pollForResult(task_id) {
  const status = document.getElementById('status');
  let attempts = 0;
  const maxAttempts = 60;

  while (attempts < maxAttempts) {
    await new Promise(r => setTimeout(r, 4000)); // 4 seconds

    try {
      const queryRes = await fetch(`${API_URL}/query_result`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task_id_list: [task_id] })
      });

      const resultData = await queryRes.json();
      console.log("Poll result:", resultData);   // For debugging

      const dataArray = resultData.data || [];
      const task = dataArray.find(t => t.task_id === task_id);

      if (task && task.status === 1) {
        // SUCCESS - Check for S3 public_url first
        if (task.public_url) {
          status.innerHTML = "✅ Song ready! (S3)";
          document.getElementById('audioPlayer').src = task.public_url;
          console.log("Playing from S3:", task.public_url);
        } 
        else {
          // Fallback
          status.innerHTML = "✅ Song ready!";
          document.getElementById('audioPlayer').src = `${API_URL}/v1/audio?task_id=${task_id}`;
        }
        return;
      } 
      else if (task && task.status === 2) {
        throw new Error(task.error || "Generation failed");
      }
    } catch (e) {
      console.error("Polling error:", e);
    }

    attempts++;
    status.innerHTML = `Generating... (${Math.round(attempts * 4)} seconds)`;
  }

  status.innerHTML = "⏰ Timeout - Song took too long";
}
</script>
