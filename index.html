<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE-Step 1.5 Song Generator</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, button { padding: 12px; margin: 10px 0; width: 100%; font-size: 16px; }
    button { background: #0066ff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎵 ACE-Step 1.5 Song Generator</h1>
  <input type="text" id="prompt" placeholder="Describe your song... (e.g. dreamy lo-fi hip hop about rainy Tokyo nights)" />
  <button onclick="generateSong()">Generate Song</button>

  <div id="status"></div>
  <audio id="audioPlayer" controls style="width:100%; margin-top:20px;"></audio>

  <script>
    const API_URL = "https://recite-dentist-divinely.ngrok-free.dev";   // ← Change this

    async function generateSong() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return alert("Please enter a prompt");

      const status = document.getElementById('status');
      status.innerHTML = "Submitting job...";

      try {
        // Step 1: Release Task
        const releaseRes = await fetch(`${API_URL}/release_task`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: prompt,
            duration: 60,
            audio_format: "wav",        // ← Add this line
            // inference_steps: 8,      // optional: lower = faster
            })
        });
        const releaseData = await releaseRes.json();
        if (!releaseData.task_id) throw new Error("No task_id received");

        status.innerHTML = `Job submitted! Task ID: ${releaseData.task_id}<br>Waiting for generation...`;

        // Step 2: Poll for result
        let attempts = 0;
        const maxAttempts = 60;   // ~2 minutes timeout

        while (attempts < maxAttempts) {
          await new Promise(r => setTimeout(r, 3000)); // wait 3 seconds

          const queryRes = await fetch(`${API_URL}/query_result`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              task_ids: [releaseData.task_id]
            })
          });

          const result = await queryRes.json();

          if (result[releaseData.task_id]) {
            const task = result[releaseData.task_id];

            if (task.status === 1) {                    // Success
              status.innerHTML = "✅ Song ready!";
              document.getElementById('audioPlayer').src = `${API_URL}/v1/audio?task_id=${releaseData.task_id}`;
              return;
            } 
            else if (task.status === 2) {               // Failed
              throw new Error(task.error || "Generation failed");
            }
          }

          attempts++;
          status.innerHTML += ".";
        }

        throw new Error("Timeout: Song took too long");

      } catch (err) {
        console.error(err);
        status.innerHTML = `❌ Error: ${err.message}`;
      }
    }
  </script>
</body>
</html>
